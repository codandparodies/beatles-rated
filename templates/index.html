<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Beatles: Rated</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    th { cursor: pointer; transition: background-color 0.2s; }
    th:hover { background-color: #facc15 !important; color: black; }
    thead tr:hover { background-color: transparent !important; }
    tr:hover { background-color: #fefce8; }
    .beatles-yellow { color: #facc15; }
  </style>
</head>
<body class="bg-zinc-950 text-white">
  <div class="max-w-6xl mx-auto p-6">
    <div class="flex justify-between items-start mb-8">
      <div class="flex-1 text-center">
        <h1 class="text-5xl font-bold tracking-tighter beatles-yellow">BEATLES: RATED</h1>
        <p class="text-gray-400 text-lg mt-2">Rate all 213 songs</p>
      </div>
      <button onclick="toggleMyRatings()" id="viewButton"
              class="px-6 py-3 bg-zinc-800 hover:bg-yellow-600 text-white rounded-2xl font-medium transition-all text-sm">
        View My Ratings
      </button>
    </div>

    <div class="flex flex-wrap gap-4 mb-6 items-end">
      <div class="flex-1">
        <label class="block text-sm font-medium mb-1 text-gray-400">Search songs</label>
        <input id="searchInput" type="text" placeholder="Yesterday, Eleanor Rigby..." 
               class="w-full bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-3 focus:outline-none focus:border-yellow-400 text-white placeholder-gray-500">
      </div>
      <div>
        <label class="block text-sm font-medium mb-1 text-gray-400">Filter by Album</label>
        <select id="albumFilter" class="bg-zinc-900 border border-zinc-700 rounded-xl px-5 py-3 focus:outline-none focus:border-yellow-400 text-white"></select>
      </div>
      <button onclick="clearAllRatings()" 
              class="bg-red-600 hover:bg-red-700 px-6 py-3 rounded-xl font-medium transition-colors">
        Clear My Ratings
      </button>
    </div>

    <div id="stats" class="text-sm text-gray-400 mb-3 text-right"></div>

    <table id="songTable" class="w-full bg-zinc-900 rounded-2xl overflow-hidden shadow-2xl">
      <thead>
        <tr class="bg-zinc-800">
          <th class="w-8 px-6 py-4 text-left">Rank</th>
          <th class="w-5/12 px-6 py-4 text-left">Song</th>
          <th class="w-2/12 px-6 py-4 text-left">Album</th>
          <th class="w-1/12 px-6 py-4 text-center">Global Avg</th>
          <th class="w-1/12 px-6 py-4 text-center">Votes</th>
          <th class="w-1/12 px-6 py-4 text-center">Your Rating</th>
          <th class="w-2/12 px-6 py-4">Rate</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-zinc-800"></tbody>
    </table>
  </div>

  <script>
    let allSongs = [];
    let currentAlbumFilter = "None";
    let currentSearch = "";

    function renderTable(filtered) {
      const tbody = document.querySelector("#songTable tbody");
      tbody.innerHTML = "";

      filtered.forEach((song, i) => {
        const row = document.createElement("tr");
        row.className = "hover:bg-yellow-950 transition-colors";
        const ratingOptions = Array.from({length:19}, (_,i) => {
          const v = (10 - i*0.5).toFixed(1);
          return `<option value="${v}">${v}</option>`;
        }).join("");

        row.innerHTML = `
          <td class="px-6 py-4 font-mono text-yellow-400">${i+1}</td>
          <td class="px-6 py-4 font-medium">${song[0]}</td>
          <td class="px-6 py-4 text-gray-400">${song[1]}</td>
          <td class="px-6 py-4 text-center font-bold text-yellow-400">${song[2]>0 ? song[2].toFixed(1) : '—'}</td>
          <td class="px-6 py-4 text-center text-gray-400">${song[3]>0 ? song[3] : '—'}</td>
          <td class="px-6 py-4 text-center font-semibold text-emerald-400">—</td>
          <td class="px-6 py-4">
            <select onchange="rateSong('${song[0]}', this.value)" class="bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2 text-white w-full focus:border-yellow-400">
              <option value="">Rate</option>
              ${ratingOptions}
            </select>
          </td>
        `;
        tbody.appendChild(row);
      });

      document.getElementById("stats").textContent = `Showing ${filtered.length} song${filtered.length===1?'':'s'}`;
    }

    function filterAndRender() {
      let filtered = allSongs;

      if (currentAlbumFilter !== "None") filtered = filtered.filter(s => s[1] === currentAlbumFilter);

      if (currentSearch) {
        const term = currentSearch.toLowerCase().replace(/['’]/g, "'");
        filtered = filtered.filter(s => s[0].toLowerCase().replace(/['’]/g, "'").includes(term));
      }

      filtered.sort((a,b) => (b[2]||0) - (a[2]||0));
      renderTable(filtered);
    }

    function populateAlbums() {
      const select = document.getElementById("albumFilter");
      const albumOrder = [
        "None",
        "Please Please Me",
        "With the Beatles",
        "A Hard Day's Night",
        "Beatles for Sale",
        "Help!",
        "Rubber Soul",
        "Revolver",
        "Sgt. Pepper's Lonely Hearts Club Band",
        "Magical Mystery Tour",
        "The Beatles",
        "Yellow Submarine",
        "Abbey Road",
        "Let It Be",
        "Other"
      ];
      select.innerHTML = albumOrder.map(a => `<option value="${a}">${a}</option>`).join("");
      select.value = "None";
      select.addEventListener("change", () => { currentAlbumFilter = select.value; filterAndRender(); });
    }

    window.rateSong = function(title, value) {
      if (!value) return;
      const form = document.createElement('form');
      form.method = 'POST';
      form.action = '/rate';
      form.innerHTML = `<input type="hidden" name="title" value="${title}"><input type="hidden" name="rating" value="${value}">`;
      document.body.appendChild(form);
      form.submit();
    };

    window.clearAllRatings = function() {
      if (confirm("Clear ALL your personal ratings?")) {
        localStorage.clear();
        location.reload();
      }
    };

    window.toggleMyRatings = function() {
      location.reload();
    };

    document.getElementById("searchInput").addEventListener("input", e => {
      currentSearch = e.target.value;
      filterAndRender();
    });

    window.onload = function() {
      allSongs = [
        {% for song in songs %}
        ["{{ song[0] | replace("'", "\\'") }}", "{{ song[1] }}", {{ song[2] }}, {{ song[3] }}],
        {% endfor %}
      ];
      populateAlbums();
      filterAndRender();
    };
  </script>
</body>
</html>
